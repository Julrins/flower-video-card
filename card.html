<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flower Card QR</title>
    <style>
      :root {
        --paper: #fffaf4;
        --ink: #281f1a;
        --muted: #6f5e53;
        --rose: #d5777e;
        --rose-deep: #a94a57;
        --line: rgba(40, 31, 26, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        padding: 24px;
        font-family: "Avenir Next", "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(213, 119, 126, 0.16), transparent 26%),
          radial-gradient(circle at bottom right, rgba(250, 211, 177, 0.22), transparent 24%),
          linear-gradient(180deg, #fef6ef 0%, #f7eee5 100%);
      }

      .layout {
        width: min(1100px, 100%);
        margin: 0 auto;
        display: grid;
        grid-template-columns: 340px 1fr;
        gap: 24px;
      }

      .panel,
      .card {
        border-radius: 28px;
        border: 1px solid var(--line);
        background: rgba(255, 250, 244, 0.9);
        box-shadow: 0 24px 70px rgba(55, 35, 28, 0.1);
      }

      .panel {
        padding: 22px;
      }

      .panel h1,
      .card h2,
      .message {
        font-family: "Georgia", "Times New Roman", serif;
      }

      .panel h1 {
        margin: 0;
        font-size: 2.1rem;
        line-height: 1;
      }

      .panel p {
        color: var(--muted);
        line-height: 1.6;
      }

      .field {
        display: grid;
        gap: 8px;
        margin-top: 16px;
      }

      .field span {
        font-size: 0.78rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
      }

      input,
      textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 16px;
        background: #fffdf9;
        padding: 14px 16px;
        font: inherit;
        color: var(--ink);
      }

      textarea {
        min-height: 120px;
        resize: vertical;
      }

      .actions {
        display: flex;
        gap: 12px;
        margin-top: 18px;
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 14px 18px;
        font: inherit;
        cursor: pointer;
      }

      .primary {
        background: linear-gradient(135deg, var(--rose) 0%, var(--rose-deep) 100%);
        color: #fff;
      }

      .secondary {
        background: #fff;
        color: var(--ink);
        border: 1px solid var(--line);
      }

      .card-wrap {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 26px;
      }

      .card {
        width: 100%;
        max-width: 700px;
        aspect-ratio: 1.5 / 1;
        padding: 34px;
        display: grid;
        grid-template-columns: 1.1fr 220px;
        gap: 24px;
        position: relative;
        overflow: hidden;
      }

      .card::before,
      .card::after {
        content: "";
        position: absolute;
        border-radius: 999px;
        background: rgba(213, 119, 126, 0.12);
      }

      .card::before {
        width: 220px;
        height: 220px;
        top: -80px;
        right: -80px;
      }

      .card::after {
        width: 160px;
        height: 160px;
        bottom: -70px;
        left: -30px;
      }

      .eyebrow {
        margin: 0;
        font-size: 0.78rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .title {
        margin: 10px 0 0;
        font-size: clamp(2rem, 5vw, 3.3rem);
        line-height: 0.96;
      }

      .message {
        margin-top: 18px;
        font-size: 1.35rem;
        line-height: 1.35;
      }

      .caption {
        margin-top: 16px;
        color: var(--muted);
        line-height: 1.5;
      }

      .qr-block {
        position: relative;
        z-index: 1;
        display: grid;
        align-content: center;
        justify-items: center;
        gap: 12px;
      }

      .qr-box {
        width: 100%;
        max-width: 210px;
        aspect-ratio: 1;
        border-radius: 24px;
        background: #fff;
        border: 1px solid var(--line);
        display: grid;
        place-items: center;
        padding: 14px;
      }

      .qr-box img {
        display: block;
        width: 100%;
        height: auto;
      }

      .qr-note {
        text-align: center;
        font-size: 0.92rem;
        color: var(--muted);
      }

      @media (max-width: 860px) {
        .layout {
          grid-template-columns: 1fr;
        }

        .card {
          aspect-ratio: auto;
          grid-template-columns: 1fr;
        }

        .qr-block {
          justify-items: start;
        }

        .qr-note {
          text-align: left;
        }
      }

      @media print {
        body {
          background: #fff;
          padding: 0;
        }

        .panel {
          display: none;
        }

        .layout {
          display: block;
          width: auto;
        }

        .card-wrap {
          padding: 0;
        }

        .card {
          width: 148mm;
          height: 105mm;
          max-width: none;
          box-shadow: none;
          border-radius: 0;
          border: 1px solid #ddd;
          break-inside: avoid;
        }
      }
    </style>
  </head>
  <body>
    <main class="layout">
      <section class="panel">
        <h1>Gift Card</h1>
        <p>
          Enter the public video page URL, customize the text, then print this
          card and put it with the flowers.
        </p>

        <label class="field">
          <span>Public video page URL</span>
          <input id="target-url" type="url" placeholder="https://example.com/fragment/" />
        </label>

        <label class="field">
          <span>Small line</span>
          <input id="eyebrow-input" type="text" value="For You" />
        </label>

        <label class="field">
          <span>Main title</span>
          <input id="title-input" type="text" value="A little surprise" />
        </label>

        <label class="field">
          <span>Message</span>
          <textarea id="message-input">Scan the QR code. I saved a small video just for you.</textarea>
        </label>

        <label class="field">
          <span>QR caption</span>
          <input id="caption-input" type="text" value="Open the video" />
        </label>

        <div class="actions">
          <button id="update-card" class="primary" type="button">Update Card</button>
          <button id="print-card" class="secondary" type="button">Print</button>
        </div>
      </section>

      <section class="card-wrap">
        <article class="card">
          <div>
            <p id="eyebrow" class="eyebrow">For You</p>
            <h2 id="title" class="title">A little surprise</h2>
            <p id="message" class="message">
              Scan the QR code. I saved a small video just for you.
            </p>
            <p class="caption">
              Point your camera at the code and the page with the video will open.
            </p>
          </div>

          <div class="qr-block">
            <div class="qr-box">
              <img id="qr-image" alt="QR code" />
            </div>
            <div id="qr-note" class="qr-note">Open the video</div>
          </div>
        </article>
      </section>
    </main>

    <script>
      const targetInput = document.getElementById("target-url");
      const eyebrowInput = document.getElementById("eyebrow-input");
      const titleInput = document.getElementById("title-input");
      const messageInput = document.getElementById("message-input");
      const captionInput = document.getElementById("caption-input");

      const eyebrow = document.getElementById("eyebrow");
      const title = document.getElementById("title");
      const message = document.getElementById("message");
      const qrNote = document.getElementById("qr-note");
      const qrImage = document.getElementById("qr-image");

      function qrUrl(value) {
        const query = new URLSearchParams({
          size: "640x640",
          data: value,
          format: "png",
          margin: "16",
        });
        return `https://api.qrserver.com/v1/create-qr-code/?${query.toString()}`;
      }

      function updateCard() {
        const value = targetInput.value.trim();
        eyebrow.textContent = eyebrowInput.value.trim() || "For You";
        title.textContent = titleInput.value.trim() || "A little surprise";
        message.textContent =
          messageInput.value.trim() ||
          "Scan the QR code. I saved a small video just for you.";
        qrNote.textContent = captionInput.value.trim() || "Open the video";

        if (value) {
          qrImage.src = qrUrl(value);
          qrImage.hidden = false;
        } else {
          qrImage.removeAttribute("src");
          qrImage.hidden = true;
        }
      }

      document.getElementById("update-card").addEventListener("click", updateCard);
      document.getElementById("print-card").addEventListener("click", () => window.print());

      updateCard();
    </script>
  </body>
</html>
