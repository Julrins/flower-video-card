name: Update Stats

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build stats snapshot
        run: python scripts_build_stats.py

      - name: Commit updated stats
        run: |
          if git diff --quiet stats.json; then
            echo "No stats changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add stats.json
          git commit -m "Update stats snapshot"
          git push
