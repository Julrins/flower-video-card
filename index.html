<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Для тебя</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="shell">
        <p class="eyebrow">For You</p>
        <h1 class="title">Я оставил тебе маленькое видео</h1>
        <p class="lead">
          Оно уже открыто. Если звук выключен, просто нажми на кнопку ниже.
        </p>

        <div class="player-wrap">
          <video
            id="clip-player"
            class="player"
            autoplay
            muted
            controls
            playsinline
            preload="auto"
            controlsList="nodownload noplaybackrate"
            disablePictureInPicture
          >
            <source id="clip-source" src="./clip-web.mp4" type="video/mp4" />
            Your browser does not support HTML5 video.
          </video>

          <button id="primary-action" class="overlay-button hidden" type="button">
            Нажми, чтобы включить видео
          </button>
        </div>

        <div class="actions">
          <button id="sound-toggle" class="button primary" type="button">
            Включить звук
          </button>
          <button id="replay-button" class="button secondary" type="button">
            Смотреть заново
          </button>
          <a id="direct-link" class="button ghost" href="./clip-web.mp4">
            Открыть видео напрямую
          </a>
        </div>

        <p id="status-text" class="status">
          Видео загружается...
        </p>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
