<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Юля, с днем рождения!</title>
    <style>
      :root {
        --paper: #fffaf4;
        --ink: #281f1a;
        --muted: #6f5e53;
        --rose: #d5777e;
        --line: rgba(40, 31, 26, 0.12);
        --shadow: 0 24px 70px rgba(55, 35, 28, 0.1);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        padding: 24px;
        font-family: "Avenir Next", "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(213, 119, 126, 0.16), transparent 26%),
          radial-gradient(circle at bottom right, rgba(250, 211, 177, 0.22), transparent 24%),
          linear-gradient(180deg, #fef6ef 0%, #f7eee5 100%);
      }

      .page {
        width: min(920px, 100%);
        margin: 0 auto;
      }

      .toolbar {
        display: flex;
        justify-content: center;
        margin-bottom: 18px;
      }

      .print-button {
        border: 0;
        border-radius: 999px;
        padding: 14px 18px;
        background: linear-gradient(135deg, #d5777e 0%, #a94a57 100%);
        color: #fff;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
      }

      .card {
        width: 100%;
        max-width: 700px;
        margin: 0 auto;
        aspect-ratio: 1.5 / 1;
        padding: 34px;
        display: grid;
        grid-template-columns: 1.1fr 220px;
        gap: 24px;
        position: relative;
        overflow: hidden;
        border-radius: 28px;
        border: 1px solid var(--line);
        background: rgba(255, 250, 244, 0.92);
        box-shadow: var(--shadow);
      }

      .card::before,
      .card::after {
        content: "";
        position: absolute;
        border-radius: 999px;
        background: rgba(213, 119, 126, 0.12);
      }

      .card::before {
        width: 220px;
        height: 220px;
        top: -80px;
        right: -80px;
      }

      .card::after {
        width: 160px;
        height: 160px;
        bottom: -70px;
        left: -30px;
      }

      .eyebrow {
        margin: 0;
        font-size: 0.78rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .title,
      .message {
        font-family: "Georgia", "Times New Roman", serif;
      }

      .title {
        margin: 10px 0 0;
        font-size: clamp(2rem, 5vw, 3.3rem);
        line-height: 0.96;
      }

      .message {
        margin: 18px 0 0;
        font-size: 1.35rem;
        line-height: 1.35;
      }

      .caption {
        margin: 16px 0 0;
        color: var(--muted);
        line-height: 1.5;
      }

      .qr-block {
        position: relative;
        z-index: 1;
        display: grid;
        align-content: center;
        justify-items: center;
        gap: 12px;
      }

      .qr-box {
        width: 100%;
        max-width: 210px;
        aspect-ratio: 1;
        border-radius: 24px;
        background: #fff;
        border: 1px solid var(--line);
        display: grid;
        place-items: center;
        padding: 14px;
      }

      .qr-box img {
        display: block;
        width: 100%;
        height: auto;
      }

      .qr-note {
        text-align: center;
        font-size: 0.92rem;
        color: var(--muted);
      }

      @media (max-width: 860px) {
        .card {
          aspect-ratio: auto;
          grid-template-columns: 1fr;
        }

        .qr-block {
          justify-items: start;
        }

        .qr-note {
          text-align: left;
        }
      }

      @media print {
        body {
          background: #fff;
          padding: 0;
        }

        .toolbar {
          display: none;
        }

        .card {
          width: 148mm;
          height: 105mm;
          max-width: none;
          box-shadow: none;
          border-radius: 0;
          border: 1px solid #ddd;
          break-inside: avoid;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <div class="toolbar">
        <button class="print-button" type="button" onclick="window.print()">Печать карточки</button>
      </div>

      <article class="card">
        <div>
          <p class="eyebrow">Для Юли</p>
          <h1 class="title">Юля, с днем рождения!</h1>
          <p class="message">
            Сегодня особенно красивый день, и число у него тоже особенное.
          </p>
          <p class="caption">
            Наведи камеру на QR, и видео откроется сразу.
          </p>
        </div>

        <div class="qr-block">
          <div class="qr-box">
            <img
              src="https://api.qrserver.com/v1/create-qr-code/?size=640x640&data=https%3A%2F%2Fjulrins.github.io%2Fflower-video-card%2F&format=png&margin=16"
              alt="QR code"
            />
          </div>
          <div class="qr-note">Сканируй, тут маленький сюрприз</div>
        </div>
      </article>
    </main>
  </body>
</html>
